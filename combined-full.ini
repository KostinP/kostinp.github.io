[settings]
root_dir = .
include_extensions = .json .ts .css .tsx .sh .json .yaml .yml .toml .conf .conf.template .go .env .mod .js .ts .jsx .tsx
include_names = Dockerfile Makefile .env.production .env.development
exclude_folders = __pycache__ .git venv node_modules .next k8s out
exclude_files = combined.py package-lock.json docs.go
case_sensitive = false
output_dir = ./output