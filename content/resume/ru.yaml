pitchFullstack:
  meta:
    title: Павел Костин - FullStack Software Developer
    description: Разработал и запустил десяток полнофункциональных веб-приложений с нуля, 
      используя React, Next.js и серверные технологии (.NET, Go, Node.js). 
      Активно использую в своей работе разнообразные технологии, такие как Docker, Kubernetes, RabbitMQ, PostgreSQL, Three.js и так далее. 
  ocupation: FullStack Software Developer
  aboutMe:
    eyebrow: // about
    label: Обо мне
    description: Разработал и запустил десяток полнофункциональных веб-приложений с нуля, 
      используя React, Next.js и серверные технологии (.NET, Go, Node.js). 
      Активно использую в своей работе разнообразные технологии, такие как Docker, Kubernetes, RabbitMQ, PostgreSQL, Three.js и так далее. 
