      вокруг них."
pitchFrontend:
  meta:
    title: Павел Костин - Frontend Developer
    description: "Frontend-разработчик: интерфейсы на React и дизайнерский бэкграунд."
  ocupation: Frontend Software Developer
  aboutMe:
    eyebrow: // about
    label: Обо мне
    description: "Frontend-разработчик: собираю интерфейсы на React — от библиотек
      компонентов до 3D-визуализаций, — а дизайнерский бэкграунд помогает не
      терять детали."
pitchTeacher:
  meta:
    title: Павел Костин - Учитель программирования
